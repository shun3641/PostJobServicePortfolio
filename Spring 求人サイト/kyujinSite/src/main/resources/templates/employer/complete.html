<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=login" />
    <link href="/css/header.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <title>登録完了</title>
</head>
<body>
<div th:replace="~{'fragments/employerHeader' :: EmployerHeader}"></div>
<div class="container py-5">

    <div class="alert alert-primary text-center" role="alert">
        <h1 class="alert-heading">求人を登録しました</h1>
        <p class="mb-0">ご登録ありがとうございます。</p>
    </div>

    <div class="text-center mt-4">
        <a href="/jobs/new" class="btn btn-primary btn-lg">
            新しい求人を作成
        </a>
    </div>
<div class="container py-4">
	<h1 class="mb-3">表示内容</h1>
<div>
<p style="font-size: 26px;"></p>
  <h2 th:text="${job.title}" style="border-bottom: 3px solid #0064ff; width: 50%;padding-bottom: 3px;
  margin-bottom: 15px;">求人タイトル</h2>
  <h4 class="text-muted mb-3" th:text="${job.companyName}">会社名</h4>

  <dl class="row">
    <dt class="col-sm-3">勤務地</dt>
    <dd class="col-sm-9" th:text="${job.locationType}">東京都</dd>

    <dt class="col-sm-3">雇用形態</dt>
    <dd class="col-sm-9" th:text="${job.employmentType}">正社員</dd>

    <dt class="col-sm-3">給与</dt>
    <dd class="col-sm-9" th:text="${job.salary}">500万〜700万円</dd>

    <dt class="col-sm-3">勤務時間</dt>
    <dd class="col-sm-9" th:text="${job.worktime}">9:00〜18:00</dd>

    <dt class="col-sm-3">休日・休暇</dt>
    <dd id="removekakko1" class="col-sm-9" th:text="${job.holidayType}">土日祝休み, 夏季休暇</dd>

    <dt class="col-sm-3">応募資格</dt>
    <dd id="removekakko2" class="col-sm-9" th:text="|${job.qualificationType}, ${job.otherqualification}|">Java経験, Spring Boot経験</dd>
  </dl>
	
  <h5>仕事内容</h5>
  <p th:text="${job.jobDescription}" style="width: 80%;">仕事内容の詳細説明が入ります。</p>
</div>
  <a th:href="@{/jobs/jobPostlist}" class="btn btn-secondary mt-3">一覧に戻る</a>

</div>
</div>
<script>
const removekakko1 = document.getElementById('removekakko1');

const removekakko2 = document.getElementById('removekakko2');

removekakko1.textContent= removekakko1.textContent.replace('[','').replace(']','');
removekakko2.textContent= removekakko2.textContent.replace('[','').replace(']','');

</script>
</body>
</html>
