<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8" />
    <title>求人編集</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=login" />
    <link href="/css/header.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <style>
	 /* モーダル背景 */
	.modal {
	  display: none; /* 初期は非表示 */
	  position: fixed;
	  inset: 0;
	  background-color: rgba(0, 0, 0, 0.5);
	  justify-content: center;
	  align-items: center;
	}
	
	/* 表示時 */
	.modal.is-active {
	  display: flex;
	}
	
	/* モーダル本体 */
	.modal-content {
	  background: #fff;
	  padding: 20px;
	  width: 70%;
	  border-radius: 8px;
	  position: relative;
	}
	
	/* 閉じるボタン */
	.close-btn {
	  position: absolute;
	  top: 8px;
	  right: 8px;
	  border: none;
	  background: none;
	  font-size: 20px;
	  cursor: pointer;
	}
	
	/* 改行文字\nをデフォルトのホワイトスペースではなく、改行と認識させるため。*/
	#updateContentsWrapper p {
	  white-space: pre-wrap;
	}
  </style>
</head>
<body>
<div th:replace="~{'fragments/employerHeader' :: EmployerHeader}"></div>
	
	<h1 class="container">求人編集</h1>
	<div class="card container-sm mt-4">
	<form class="editForm" th:action="@{/jobs/update/{id}(id=${jobform.id})}" method="post" th:object="${jobform}"
	onsubmit="return confirmSubmit();">
   <div class="card-body">
   <p th:text="${jobform.id}"></p>
   	<div>
	    <label class="form-label">求人タイトル</label>
		<input type="text" class="title form-control form-control-lg　fs-2" th:value="*{title}" name="title"
		 style="width: 50%;">
	</div>
	<div>
	    <label class="form-label">会社名</label>
		<input type="text" class="companyName form-control" th:value="*{companyName}" name="companyName"
		            style="width: 50%;"/>
    </div>
	
	
    <ul class="list-unstyled d-flex flex-row mt-3 align-items-center flex-wrap" style="width: 60%;">
        <li class="mb-1 d-flex flex-row align-items-center">
        <i class="bi bi-geo-alt me-1"></i>
        <label class="form-label">勤務地</label>

       <select class="locationType form-select" th:value="*{locationType}" name="locationType">
	        <option>選択してください</option>
	        <option th:each="pref : ${prefectures}" th:value="${pref}" th:text="${pref}"
	            	th:selected="*{locationType}==${pref}?selected"></option>
	   </select>
    	</li>
        <li class="mb-1 d-flex flex-row align-items-center ms-3">
        <i class="bi bi-geo-alt me-1"></i>
        <span class="inputTitle">住所</span>
        <input class="address form-control form-control-lg　fs-2" type="text" th:value="*{address}"
        name="address">
    	</li>
    
        <li class="mb-1 d-flex flex-row align-items-center">
        <i class="bi bi-currency-yen me-1"></i>
        	<label class="form-label">給与</label>
	            <select class="salaryType form-select" th:value="*{salaryType}" name="salaryType">
	                <option value="">選択してください</option>
	                <option th:each="s : ${salaryList}" th:value="${s}" th:text="${s.salaryRange}"
	                th:selected="*{salaryType.salaryRange}==${s.salaryRange}"></option>
	            </select>
	    </li>
    <li class="mb-1 d-flex align-items-center flex-row"><i class="bi bi-briefcase me-1"></i>
    	<label class="form-label">雇用形態</label>
	            <select class="employmentType form-select" th:value="*{employmentType}" name="employmentType">
	                <option>選択してください</option>
	                <option th:each="e : ${employmentTypes}" th:value="${e}" th:text="${e}"
	                th:selected="*{employmentType}==${e}"></option>
	            </select>
    </li>
    <li class="mb-1 d-flex align-items-center flex-row ms-3"><i class="bi bi-briefcase me-1"></i>
    	<label class="form-label">電話番号</label>
	            <input class="tel form-control form-control-lg　fs-2" type="text" th:value="*{tel}"
        name="tel">
    </li>
      </ul>
    	<label class="form-label">応募資格（複数選択可）</label>
	            <div class="row" style="width: 60%;">
	                <div class="col-md-3" th:each="q : ${QualificationType}">
	                    <div class="form-check mb-2">
	                        <input class="QualificationType form-check-input" type="checkbox" th:value="${q}" 
	                        th:checked="${#lists.contains(jobform.qualificationType,q)}" name="QualificationType">
	                        <label class="form-check-label qualification" th:text="${q}"></label>
	                    </div>
	                </div>
	                <div>その他資格</div>
	                <input th:value="*{otherqualification}" class="otherqualification p-2" name="otherqualification">
	            </div>
    <div>
    <div class="mb-3 mt-3" style="width: 30%;">
	            <label class="form-label">勤務時間</label>
	            <select class="workingHourType form-select" th:value="*{workingHourType}" name="workingHourType">
	                <option value="">選択してください</option>
	                <option th:each="w : ${workingHourList}" th:value="${w}" th:text="${w.time}"
	                th:selected="*{workingHourType}==${w}"></option>
	            </select>
	 </div>
    </div>
	<div class="mb-3" style="width: 60%;">
	   <label class="form-label">休日・休暇（複数選択可）</label>
	   <div class="row">
	       <div class="col-md-3" th:each="h : ${HolidayType}">
	          <div class="form-check mb-2">
	               <input class="HolidayType form-check-input" type="checkbox" th:value="${h}"
	                        th:checked="${#lists.contains(jobform.holidayType,h)}" name="HolidayType">
	               <label class="form-check-label holiday" th:text="${h}"></label>
	          </div>
	       </div>
	    </div>
	</div>
	        <div class="mb-3">
	            <label class="form-label">仕事内容</label>
	            <textarea class="jobDescription form-control" rows="5" th:value="*{jobDescription}"
	            th:text="*{jobDescription}" name="jobDescription"></textarea>
	        </div>
    <div class="mt-3">
	    <button type="button" class="openBtn btn btn-primary">更新する</button>
	        <a th:href="@{/jobs/jobPostlist}" class="btn btn-secondary ms-2">一覧に戻る</a>
  	</div>
  </div>
  
  <p class="dayAgo" th:text="${jobform.updatedAt}"></p>
<div id="modal" class="modal">
    <div class="modal-content">
      <button class="closeBtn" type="button">×</button>
      <h2>確認画面</h2>
      <p>以下の内容で更新します。よろしいですか。</p>
      <div id="updateContentsWrapper">
      <p></p>
      </div>
      <div class="row">
      <button type="submit" class="submit btn btn-primary col-2">はい</button>
      <button type="button" class="col-2 btn-secondary ms-2" onclick="return chancel();">いいえ</button>
      </div>
    </div>
  </div>
  </form>
</div>
<script src="/js/edit.js"></script>
	
</body>
</html>
