<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8" />
    <title>求人編集</title>
    <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
<style>
.inputTitle {
	display: inline-block;
	width: 50px;
}
.form-label {
	width: 80%;
}
</style>
</head>
<body>
<div class="card container-sm">
<form>
   <div class="card-body">
    <h1 class="card-title fs-3">エンジニア</h1>
    <span class="mt-3 d-block">タイトル</span>
    <input class="form-control form-control-lg　fs-2" type="text" placeholder=".form-control-lg" aria-label=".form-control-lg example"
    value="バックエンドエンジニア募集!" style="width: 50%;">
    <span class="mt-3 d-block">会社名</span>
    <input class="form-control form-control-lg　fs-2" type="text" placeholder=".form-control-lg" aria-label=".form-control-lg example"
    value="田中駿吾株式会社" style="width: 50%;">
    <ul class="list-unstyled d-flex flex-row mt-3 align-items-center">
        <li class="mb-1 d-flex flex-row align-items-center">
        <i class="bi bi-geo-alt me-1"></i>
        <span class="inputTitle">住所</span>
        <input class="form-control form-control-lg　fs-2" type="text" placeholder=".form-control-lg" aria-label=".form-control-lg example"
    value="田中市田中町00-00-0">
    	</li>
    
        <li class="mb-1 d-flex flex-row align-items-center ms-3">
        <i class="bi bi-currency-yen me-1"></i>
        <span class="inputTitle">給与</span>
        <input class="form-control form-control-lg　fs-2" type="text" placeholder=".form-control-lg" aria-label=".form-control-lg example"
    value="~300万円"></li>
    <li class="mb-1 d-flex align-items-center flex-row ms-3"><i class="bi bi-briefcase me-1"></i>
    <span class="inputTitle">雇用形態</span>
        <input class="form-control form-control-lg　fs-2 ms-1" type="text" placeholder=".form-control-lg" aria-label=".form-control-lg example"
    value="正社員">
    </li>
      </ul>
      <span class="mt-3 d-block">応募資格（複数選択可）
</span>
    <ul class="list-unstyled row mt-2" style="width: 90%;">
    <li class="col-4">
    	<input class="form-check-input" type="checkbox" value="" id="flexCheckDefault">
    	<label class="form-label">未経験可
</label>
    </li>
    <li class="col-4">
    	<input class="form-check-input" type="checkbox" value="" id="flexCheckDefault">
    	<label class="form-label">実務経験1年以上
</label>
    </li>
    <li class="col-4">
    	<input class="form-check-input" type="checkbox" value="" id="flexCheckDefault">
    	<label class="form-label">SpringBoot経験
</label>
    </li>
    <li class="col-4">
    	<input class="form-check-input" type="checkbox" value="" id="flexCheckDefault">
    	<label class="form-label">リモート可
</label>
    </li>
    <li class="col-4">
    	<input class="form-check-input" type="checkbox" value="" id="flexCheckDefault">
    	<label class="form-label">学歴不問
</label>
    </li>
    <li class="mt-3">
    <span>その他資格</span>
    <input class="form-control form-control-lg　fs-2" type="text" placeholder=".form-control-lg" aria-label=".form-control-lg example"
    value="java出来る方" style="width: 50%;">
    </li>
    </ul>
    <div>
    <span>勤務時間</span>
    <select class="p-2">
    	<option>10:00~18:00</option>
    </select>
    </div>
          <span class="mt-3 d-block mt-3">休日・休暇（複数選択可）</span>
    
    <ul class="list-unstyled row mt-1" style="width: 90%;">
    <li class="col-4">
    	<input class="form-check-input" type="checkbox" value="" id="flexCheckDefault">
    	<label class="form-label">未経験可
</label>
    </li>
    <li class="col-4">
    	<input class="form-check-input" type="checkbox" value="" id="flexCheckDefault">
    	<label class="form-label">実務経験1年以上
</label>
    </li>
    <li class="col-4">
    	<input class="form-check-input" type="checkbox" value="" id="flexCheckDefault">
    	<label class="form-label">SpringBoot経験
</label>
    </li>
    <li class="col-4">
    	<input class="form-check-input" type="checkbox" value="" id="flexCheckDefault">
    	<label class="form-label">リモート可
</label>
    </li>
    <li class="col-4">
    	<input class="form-check-input" type="checkbox" value="" id="flexCheckDefault">
    	<label class="form-label">学歴不問
</label>
    </li>
    
    </ul>
    <div>
    <span class="mt-3 d-block mt-2">仕事内容</span>
    <textarea style="width: 50%;" rows="5" >
    いい仕事あるよ。
    </textarea>
    </div>
    <div class="mt-3">
	    <button type="submit" class="btn btn-primary">更新する</button>
	  	<a href="/jobs" class="btn btn-secondary ms-2">一覧に戻る</a>
  	</div>
  </div>
  	        
  
  </form>
</div>
</body>
</html>
