<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>求人投稿</title>
 <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=login" />  
<link href="/css/header.css" rel="stylesheet" />
<link href="/css/jobPosting.css" rel="stylesheet" />
</head>

<body>
    <div th:replace="~{'fragments/employerHeader' :: EmployerHeader}"></div>


<div class="container">
    <div class="card">

        <h1>求人投稿</h1>

        <!-- ステップ表示 -->
        <div class="steps">
            <div class="step-indicator active">基本情報</div>
            <div class="step-indicator">雇用条件</div>
            <div class="step-indicator">詳細</div>
        </div>

        <form th:action="@{/jobs/new}" th:object="${jobPostingForm}" method="post">

            <!-- STEP 1 -->
            <div class="step active">
                <label>求人タイトル</label>
                <input type="text" th:field="*{title}" placeholder="例：バックエンドエンジニア">

                <label>会社名</label>
                <input type="text" th:field="*{companyName}" placeholder="例：株式会社サンプル">

                <div class="buttons">
                    <div></div>
                    <button type="button" class="btn-primary" onclick="next()">次へ</button>
                </div>
            </div>

            <!-- STEP 2 -->
            <div class="step">
                <div class="mb-3">
				    <label class="form-label">勤務地（都道府県）</label>
				    <select class="form-select" th:field="*{locationType}">
				        <option value="">選択してください</option>
				        <option th:each="pref : ${prefectures}"
				                th:value="${pref}"
				                th:text="${pref}">
				        </option>
				    </select>
				    <label class="form-label">住所</label>
				    <input type="text" th:field="*{address}" placeholder="例：田中市田中町00-00-0">
				    
				    <label class="form-label">電話番号</label>
				    <input type="text" th:field="*{tel}" placeholder="例：000-000-0000">
				    
				</div>

                <label>雇用形態</label>
                <select th:field="*{employmentType}">
                    <option value="">選択してください</option>
                    <option th:each="type : ${employmentTypes}"
                            th:value="${type}"
                            th:text="${type}">
                    </option>
                </select>

                <div class="buttons">
                    <button type="button" class="btn-secondary" onclick="prev()">戻る</button>
                    <button type="button" class="btn-primary" onclick="next()">次へ</button>
                </div>
            </div>

            <!-- STEP 3 -->
            <div class="step">
               <div class="mb-3">
			    <label class="form-label">勤務時間</label>
			    <select class="form-select" th:field="*{workingHourType}">
			        <option value="">選択してください</option>
			        <option th:each="wh : ${workingHourList}"
			                th:value="${wh}"
			                th:text="${wh.time}">
			        </option>
			    </select>

			</div>

     <div class="mb-3">
	    <label class="form-label">休日・休暇（複数選択可）</label>
	
	    <div class="d-flex flex-wrap gap-3 form-check-parts">
	        <div class="form-check"
	             th:each="h : ${HolidayType}">
	            <input class="form-check-input"
	                   type="checkbox"
	                   th:field="*{HolidayType}"
	                   th:value="${h}">
	            <label class="form-check-label option"
	                   th:text="${h}"></label>
	        </div>
	    </div>
	</div>

                <label>仕事内容</label>
                <textarea th:field="*{jobDescription}"></textarea>
	<div class="mb-3">
    <label class="form-label">給与</label>
    <select class="form-select" th:field="*{salaryType}">
        <option value="">選択してください</option>
        <option th:each="s : ${salaryList}"
                th:value="${s}"
                th:text="${s.salaryRange}">
        </option>
    </select>
	</div>
    <div class="mb-3">
	    <label class="form-label">応募資格（複数選択可）</label>
	
	    <div class="d-flex flex-wrap gap-3 form-check-parts">
	        <div class="form-check"
	             th:each="q : ${QualificationType}">
	            <input class="form-check-input"
	                   type="checkbox"
	                   th:field="*{qualificationType}"
	                   th:value="${q}"
	                   id="q-[[${q}]]">
	            <label class="form-check-label option"
	                   th:for="|q-${q}|"
	                   th:text="${q}">
	            </label>
	            
	        </div>
	        <div class="otherBox">
	        <label class="otherlabel">その他(応募資格)</label>
	        <input class="input"
	                   type="text"
	                   th:field="*{otherqualification}">
	       </div>
	    </div>
	</div>

                <div class="buttons">
                    <button type="button" class="btn-secondary" onclick="prev()">戻る</button>
                    <button type="submit" class="btn-primary">登録</button>
                </div>
            </div>

        </form>
    </div>
</div>

<script>
    let current = 0;
    const steps = document.querySelectorAll('.step');
    const indicators = document.querySelectorAll('.step-indicator');

    function update() {
        steps.forEach((s, i) => s.classList.toggle('active', i === current));
        indicators.forEach((i, idx) => i.classList.toggle('active', idx === current));
    }

    function next() {
        if (current < steps.length - 1) {
            current++;
            update();
        }
    }

    function prev() {
        if (current > 0) {
            current--;
            update();
        }
    }
</script>

</body>
</html>
