<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=login" />
<link href="/css/header.css" rel="stylesheet" />
<title>Insert title here</title>
</head>
<body>
<p sec:authorize="hasAuthority('USER')"></p>
<div th:replace="~{'fragments/userHeader' :: UserHeader}" sec:authorize="hasAuthority('USER')"></div>
<br><h3 style="margin-left: 30px;" sec:authorize="hasAuthority('USER')">アカウントのログインに成功しました。</h3>
<p sec:authorize="isAuthenticated()">ログイン済み</p>
</body>
</html>
